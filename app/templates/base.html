<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Quote Generator{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50:'#eff6ff', 100:'#dbeafe', 500:'#3b82f6', 600:'#2563eb', 700:'#1d4ed8', 900:'#1e3a5f' }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="bg-slate-50 min-h-screen flex flex-col text-slate-800">
  <nav class="bg-brand-900 text-white shadow-lg">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-14">
        <a href="/" class="flex items-center gap-2 font-bold text-lg tracking-tight">
          <svg class="w-5 h-5 text-brand-100" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
          Quote Generator
        </a>
        <div class="flex items-center gap-1">
          <a href="/" class="nav-link {% if request.url.path == '/' %}nav-active{% endif %}">Dashboard</a>
          <a href="/customers" class="nav-link {% if '/customers' in request.url.path %}nav-active{% endif %}">Customers</a>
          <a href="/quotes" class="nav-link {% if '/quotes' in request.url.path %}nav-active{% endif %}">Quotes</a>
          <a href="/quotes/new" class="ml-2 bg-brand-600 hover:bg-brand-500 px-3 py-1.5 rounded-md text-sm font-medium transition">+ New quote</a>
        </div>
      </div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 pt-4">
    {% if msg %}
    <div class="flex items-center gap-2 bg-green-50 border border-green-200 text-green-800 px-4 py-3 rounded-lg mb-4">
      <svg class="w-5 h-5 text-green-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
      </svg>
      <span>{{ msg }}</span>
    </div>
    {% endif %}
    {% if error %}
    <div class="flex items-center gap-2 bg-red-50 border border-red-200 text-red-800 px-4 py-3 rounded-lg mb-4">
      <svg class="w-5 h-5 text-red-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
        <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
      </svg>
      <span>{{ error }}</span>
    </div>
    {% endif %}
  </div>

  <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 pb-10">
    {% block content %}{% endblock %}
  </main>

  <footer class="bg-white border-t border-slate-200 py-4 text-center text-sm text-slate-400">
    Quote Generator &copy; {{ 2026 }}
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
